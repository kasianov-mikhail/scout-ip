name: Surface errors
description: Dumps an xcodebuild log and distills its tail into a GitHub error annotation.

inputs:
  log:
    description: Path to the xcodebuild log to scan.
    required: true
  title:
    description: Title for the error annotation.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        LOG: ${{ inputs.log }}
        TITLE: ${{ inputs.title }}
      run: |
        echo "::group::Full log"
        cat "$LOG" || true
        echo "::endgroup::"
        ERR=$(grep -iE 'error:|error |fatal|failed' "$LOG" | tail -20)
        if [ -n "$ERR" ]; then
          echo "::error title=$TITLE::$(echo "$ERR" | sed ':a;N;$!ba;s/\n/%0A/g')"
        fi
