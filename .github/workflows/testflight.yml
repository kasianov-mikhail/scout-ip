name: TestFlight

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      IPINFO_KEY: ${{ secrets.IPINFO_KEY }}
      SCOUT_IP: ${{ secrets.SCOUT_IP }}
      SCOUT_API_KEYS: ${{ secrets.SCOUT_API_KEYS }}

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set build number
        run: agvtool new-version -all $GITHUB_RUN_NUMBER

      - name: Resolve version
        id: version
        uses: ./.github/resolve-version

      - name: Set up signing
        uses: ./.github/signing
        with:
          build-certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          # Required for archive under automatic signing — do not remove (see #325/#328).
          dev-certificate-base64: ${{ secrets.DEV_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          api-key-base64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}

      - name: Archive
        id: archive
        run: |
          set -o pipefail
          xcodebuild archive \
            IPINFO_KEY="$IPINFO_KEY" \
            SCOUT_IP="$SCOUT_IP" \
            SCOUT_API_KEYS="$SCOUT_API_KEYS" \
            -project ScoutIP.xcodeproj \
            -scheme ScoutIP \
            -archivePath $RUNNER_TEMP/ScoutIP.xcarchive \
            -destination 'generic/platform=iOS' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            2>&1 | tee "$RUNNER_TEMP/archive.log" | xcbeautify --renderer github-actions

      - name: Surface archive errors
        if: failure() && steps.archive.outcome == 'failure'
        uses: ./.github/surface-errors
        with:
          log: ${{ runner.temp }}/archive.log
          title: Archive failed

      - name: Export archive
        id: export
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ScoutIP.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            2>&1 | tee "$RUNNER_TEMP/export.log" | xcbeautify --renderer github-actions

      - name: Surface export errors
        if: failure() && steps.export.outcome == 'failure'
        uses: ./.github/surface-errors
        with:
          log: ${{ runner.temp }}/export.log
          title: Export failed

      - name: Upload to TestFlight
        id: upload
        run: |
          OUTPUT=$(xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/ScoutIP.ipa \
            --type ios \
            --apiKey $APP_STORE_CONNECT_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No errors"; then
            echo "Upload succeeded"
          elif echo "$OUTPUT" | grep -q "CFBundleShortVersionString"; then
            echo "needs_bump=true" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -q "agreement"; then
            echo "::error::A required agreement is missing or has expired. Accept it at https://appstoreconnect.apple.com/agreements"
            exit 1
          elif echo "$OUTPUT" | grep -q "Upload limit"; then
            echo "::error::Upload limit reached. Try again tomorrow."
            exit 1
          else
            echo "::error::Upload failed with unknown error"
            exit 1
          fi

      - name: Persist version via PR
        if: steps.upload.outputs.needs_bump == 'true' || steps.version.outputs.drift == 'true'
        uses: ./.github/persist-version
        with:
          original: ${{ steps.version.outputs.original }}
          built: ${{ steps.version.outputs.value }}
          needs-bump: ${{ steps.upload.outputs.needs_bump }}
          token: ${{ secrets.GH_PAT }}

      - name: Tag build
        if: steps.upload.outputs.needs_bump != 'true'
        run: |
          git tag "${{ steps.version.outputs.value }}-$GITHUB_RUN_NUMBER"
          git push origin "${{ steps.version.outputs.value }}-$GITHUB_RUN_NUMBER"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
          rm -rf ~/private_keys ~/Library/MobileDevice/Provisioning\ Profiles/* 2>/dev/null || true
