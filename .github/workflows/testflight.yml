name: TestFlight

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [scout-updated]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Scout dependency
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          xcodebuild -resolvePackageDependencies -project ScoutIP.xcodeproj
          if git diff --quiet; then
            echo "No dependency changes"
          else
            BRANCH="auto/update-scout-$(date +%s)"
            git checkout -b "$BRANCH"
            git add ScoutIP.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
            git commit -m "Update Scout dependency"
            git push -u origin "$BRANCH"
            gh pr create --title "Update Scout dependency" --body "Triggered by Scout update" --head "$BRANCH" --base main
            gh pr merge "$BRANCH" --rebase --delete-branch
            git checkout main
            git pull
          fi

      - name: Prepare release notes
        id: notes
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            NOTES="Scout changes:"
            NOTES="$NOTES
          ${{ github.event.client_payload.changes }}"
          else
            NOTES=$(git log --format="- %s" -5)
          fi
          echo "value<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set build number
        run: agvtool new-version -all $GITHUB_RUN_NUMBER

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -m1 MARKETING_VERSION ScoutIP.xcodeproj/project.pbxproj | sed 's/.*= //;s/;//;s/ //g')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Write Secrets.json
        run: printf '{"IPINFO_KEY":"%s"}' "$IPINFO_KEY" > ScoutIP/Resources/Secrets.json
        env:
          IPINFO_KEY: ${{ secrets.IPINFO_KEY }}

      - name: Install certificates and profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          DEV_CERTIFICATE_BASE64: ${{ secrets.DEV_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          DIST_PATH=$RUNNER_TEMP/distribution.p12
          DEV_PATH=$RUNNER_TEMP/development.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $DIST_PATH
          echo -n "$DEV_CERTIFICATE_BASE64" | base64 --decode -o $DEV_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $DIST_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security import $DEV_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Write API key
        run: |
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}

      - name: Archive
        run: |
          xcodebuild archive \
            -project ScoutIP.xcodeproj \
            -scheme ScoutIP \
            -archivePath $RUNNER_TEMP/ScoutIP.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ScoutIP.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        id: upload
        run: |
          OUTPUT=$(xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/ScoutIP.ipa \
            --type ios \
            --apiKey $APP_STORE_CONNECT_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "CFBundleShortVersionString"; then
              echo "needs_bump=true" >> $GITHUB_OUTPUT
            else
              exit 1
            fi
          }

      - name: Set What to Test
        if: steps.upload.outputs.needs_bump != 'true'
        env:
          NOTES: ${{ steps.notes.outputs.value }}
          KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
        run: |
          python3 << PYEOF
          import json, time, base64, subprocess, urllib.request, os

          key_id = os.environ["APP_STORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APP_STORE_CONNECT_ISSUER_ID"]
          key_path = os.path.expanduser(os.environ["KEY_PATH"])
          build_number = os.environ["GITHUB_RUN_NUMBER"]
          notes = os.environ["NOTES"]

          now = int(time.time())
          def b64url(data):
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

          header = b64url(json.dumps({"alg": "ES256", "kid": key_id, "typ": "JWT"}).encode())
          payload = b64url(json.dumps({"iss": issuer_id, "iat": now, "exp": now + 1200, "aud": "appstoreconnect-v1"}).encode())
          msg = f"{header}.{payload}".encode()
          sig_der = subprocess.check_output(["openssl", "dgst", "-sha256", "-sign", key_path], input=msg, stderr=subprocess.DEVNULL)
          i = 2
          if sig_der[1] & 0x80: i += sig_der[1] & 0x7f
          r_len = sig_der[i+1]; r = sig_der[i+2:i+2+r_len]; i += 2 + r_len
          s_len = sig_der[i+1]; s = sig_der[i+2:i+2+s_len]
          r = r[-32:].rjust(32, b"\x00"); s = s[-32:].rjust(32, b"\x00")
          jwt_token = f"{header}.{payload}.{b64url(r + s)}"
          headers = {"Authorization": f"Bearer {jwt_token}", "Content-Type": "application/json"}

          build_id = None
          for attempt in range(10):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/builds?filter[version]={build_number}&filter[app]=6738300344",
                  headers=headers)
              try:
                  resp = json.loads(urllib.request.urlopen(req).read())
                  if resp["data"]:
                      build_id = resp["data"][0]["id"]
                      break
              except Exception:
                  pass
              print(f"Waiting for build... attempt {attempt + 1}")
              time.sleep(30)

          if not build_id:
              print("Build not found, skipping What to Test")
              exit(0)

          body = json.dumps({"data": {"type": "betaBuildLocalizations", "attributes": {"locale": "en-US", "whatsNew": notes}, "relationships": {"build": {"data": {"type": "builds", "id": build_id}}}}}).encode()
          req = urllib.request.Request("https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations", data=body, method="POST", headers=headers)
          try:
              urllib.request.urlopen(req)
              print(f"What to Test set for build {build_number}")
          except urllib.error.HTTPError as e:
              req2 = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/builds/{build_id}/betaBuildLocalizations", headers=headers)
              locs = json.loads(urllib.request.urlopen(req2).read())
              if locs["data"]:
                  loc_id = locs["data"][0]["id"]
                  body2 = json.dumps({"data": {"type": "betaBuildLocalizations", "id": loc_id, "attributes": {"whatsNew": notes}}}).encode()
                  req3 = urllib.request.Request(f"https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations/{loc_id}", data=body2, method="PATCH", headers=headers)
                  urllib.request.urlopen(req3)
                  print(f"What to Test updated for build {build_number}")
          PYEOF

      - name: Bump version via PR
        if: steps.upload.outputs.needs_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION=${{ steps.version.outputs.value }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEW_VERSION="$MAJOR.$((MINOR + 1))"

          BRANCH="auto/bump-$NEW_VERSION"
          git checkout -b "$BRANCH"

          sed -i '' "s/MARKETING_VERSION = $VERSION;/MARKETING_VERSION = $NEW_VERSION;/g" ScoutIP.xcodeproj/project.pbxproj

          git add ScoutIP.xcodeproj/project.pbxproj
          git commit -m "Bump version to $NEW_VERSION"
          git push -u origin "$BRANCH"
          gh pr create --title "Bump version to $NEW_VERSION" --body "Auto-bump: App Store rejected version $VERSION" --head "$BRANCH" --base main
          gh pr merge "$BRANCH" --rebase --delete-branch

      - name: Tag build
        if: steps.upload.outputs.needs_bump != 'true'
        run: |
          git tag "${{ steps.version.outputs.value }}-$GITHUB_RUN_NUMBER"
          git push origin "${{ steps.version.outputs.value }}-$GITHUB_RUN_NUMBER"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
          rm -rf ~/private_keys ~/Library/MobileDevice/Provisioning\ Profiles/* 2>/dev/null || true
