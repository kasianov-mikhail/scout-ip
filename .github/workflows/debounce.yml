name: Hourly TestFlight

on:
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for new commits
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LAST_SHA=$(gh run list --repo ${{ github.repository }} --workflow testflight.yml --status success --limit 1 --json headSha --jq '.[0].headSha // empty')

          if [ -z "$LAST_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_SHA" != "$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No new commits since last successful deploy"
          fi

      - name: Check upload limit
        if: steps.commits.outputs.has_changes == 'true'
        id: limit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LAST_RUN=$(gh run list --repo ${{ github.repository }} --workflow testflight.yml --limit 1 --json conclusion,createdAt --jq '.[0]')
          CONCLUSION=$(echo "$LAST_RUN" | jq -r '.conclusion')
          CREATED=$(echo "$LAST_RUN" | jq -r '.createdAt')
          TODAY=$(date -u +%Y-%m-%d)

          if [ "$CONCLUSION" = "failure" ] && [[ "$CREATED" == "$TODAY"* ]]; then
            LOGS=$(gh run list --repo ${{ github.repository }} --workflow testflight.yml --limit 1 --json databaseId --jq '.[0].databaseId')
            if gh run view "$LOGS" --repo ${{ github.repository }} --log 2>/dev/null | grep -q "Upload limit"; then
              echo "rate_limited=true" >> $GITHUB_OUTPUT
              echo "Upload limit reached today, skipping"
            fi
          fi

      - name: Trigger TestFlight
        if: steps.commits.outputs.has_changes == 'true' && steps.limit.outputs.rate_limited != 'true'
        run: gh workflow run testflight.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}