name: Hourly TestFlight

on:
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for new commits
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          LAST_SHA=$(gh run list --repo ${{ github.repository }} --workflow testflight.yml --status success --limit 1 --json headSha --jq '.[0].headSha // empty')

          if [ -z "$LAST_SHA" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_SHA" != "$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No new commits since last successful deploy"
          fi

      - name: Trigger TestFlight
        if: steps.commits.outputs.has_changes == 'true'
        run: gh workflow run testflight.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}