name: Build Matrix

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: xcrun swift-format lint --recursive ScoutIP ScoutIPUITests

  build:
    name: ${{ matrix.device }} (iOS ${{ matrix.ios }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            device: iPhone 16
            ios: 18
          - os: macos-26
            device: iPhone 17
            ios: 26
          - os: macos-26
            device: iPhone 17 Pro Max
            ios: 26

    steps:
      - uses: actions/checkout@v6

      - name: Prepare simulator
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            xcodebuild -downloadPlatform iOS
          fi

      - name: Build
        run: |
          xcodebuild build \
            IPINFO_KEY=${{ secrets.IPINFO_KEY }} \
            -project ScoutIP.xcodeproj \
            -scheme ScoutIP \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}'

  ui-tests:
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project ScoutIP.xcodeproj \
            -scheme ScoutIP \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:ScoutIPUITests \
            IPINFO_KEY=${{ secrets.IPINFO_KEY }}
